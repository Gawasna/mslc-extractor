name: Build x64 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore Native.sln

      - name: Build solution (x64 Release)
        run: msbuild Native.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Create SHA256SUMS.txt
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE 'x64\Release'
          if (-not (Test-Path $out)) { Write-Error "Output folder not found: $out"; exit 1 }
          $sumfile = Join-Path $out "SHA256SUMS.txt"
          Get-ChildItem -Path $out -File |
            Where-Object { $_.Extension -in '.exe', '.dll' } |
            Sort-Object Name |
            ForEach-Object {
              $h = Get-FileHash $_.FullName -Algorithm SHA256
              "{0}  {1}" -f $h.Hash.ToLower(), $_.Name
            } | Out-File -FilePath $sumfile -Encoding ASCII
          Write-Host "Checksums written to $sumfile"
          Get-Content $sumfile

      - name: Package release artifacts (zip)
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE 'x64\Release'
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual" }
          $zipName = "mslc-extractor-$tag-win-x64.zip"
          $zipPath = Join-Path $out $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$out\Loader.exe", "$out\HookCore.dll", "$out\SHA256SUMS.txt" -DestinationPath $zipPath -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV
          Write-Host "Created artifact: $zipName"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            x64/Release/Host.exe
            x64/Release/Agent.dll
            x64/Release/SHA256SUMS.txt
            ${{ env.ZIP_PATH }}

      - name: Upload build artifact (Actions UI)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}

      - name: Create GitHub release (from tag) and attach zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ### Binaries Details
            - **Platform**: Windows x64
            - **Version**: ${{ github.ref_name }}
            - **Build Run**: [View Process](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            **Security Verification:**
            - Verify SHA256 checksums in the `SHA256SUMS.txt` inside the zip.
            - This build is verified with **GitHub Artifact Attestations** (check the link above).
            
            > **Note**: Anti-virus software may flag these files due to the memory hooking techniques used to extract text.
          artifacts: ${{ env.ZIP_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false